<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>person</title>
  <link rel="stylesheet" href="./person.css"></link>
  <link rel="stylesheet" href="/icomoon/style.css"></link>
</head>
<body>
  <div class="main-background"></div>

    <div class="person-user">
      <div class="header-person">

          <li>我的简历</li>
          <li>我的消息</li>
          <li>收藏</li>
          <li>点赞</li>
        </ul>
        </div>
        <div class="person-content">
          <div class="content-myJl"></div>
          <div class="content-inform">
            <ul>
              <li>1</li>

    </div>

</body>
